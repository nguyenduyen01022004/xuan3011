<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Xuân 8/3</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(#ff6fa5,#ffd6e7);
font-family:cursive;
text-align:center;
}

/* chữ chúc */
.text{
position:absolute;
top:20%;
width:100%;
font-size:45px;
color:white;
text-shadow:0 0 10px red,0 0 20px pink;
}

/* tim lửa */
.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:150px;
animation:beat 1s infinite;
filter:drop-shadow(0 0 20px red);
}

@keyframes beat{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

/* hiệu ứng lửa */
.fire{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:150px;
color:orange;
opacity:0.6;
animation:fire 1s infinite alternate;
}

@keyframes fire{
0%{filter:blur(2px) brightness(1);}
100%{filter:blur(6px) brightness(1.6);}
}

/* hoa rơi */
.flower{
position:absolute;
font-size:25px;
animation:fall linear infinite;
}

/* tuyết rơi */
.snow{
position:absolute;
font-size:18px;
color:white;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="text">
🌸 Chúc Xuân 8/3 vui vẻ 🌸
</div>

<div class="fire">❤️</div>
<div class="heart">❤️</div>

<script>

/* hoa rơi */
function createFlower(){
let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=4+Math.random()*4+"s";

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),8000);
}

setInterval(createFlower,400);


/* tuyết rơi */
function createSnow(){
let snow=document.createElement("div");
snow.className="snow";
snow.innerHTML="❄";

snow.style.left=Math.random()*100+"vw";
snow.style.animationDuration=5+Math.random()*5+"s";

document.body.appendChild(snow);

setTimeout(()=>snow.remove(),9000);
}

setInterval(createSnow,300);

</script>

</body>
</html>
